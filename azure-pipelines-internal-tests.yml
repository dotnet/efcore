variables:
  - name: _BuildConfig
    value: Release
  - name: DOTNET_SKIP_FIRST_TIME_EXPERIENCE
    value: true
  - name: _PublishUsingPipelines
    value: true
  - group: DotNet-HelixApi-Access
  - name: _InternalRuntimeDownloadArgs
    value: /p:DotNetRuntimeSourceFeed=https://ci.dot.net/internal /p:DotNetRuntimeSourceFeedKey=$(dotnetbuilds-internal-container-read-token-base64)
  - name: LC_ALL
    value: 'en_US.UTF-8'
  - name: LANG
    value: 'en_US.UTF-8'
  - name: LANGUAGE
    value: 'en_US.UTF-8'
  - template: /eng/common/templates-official/variables/pool-providers.yml@self
trigger:
  batch: true
  branches:
    include:
      - main
      - release/*
      - feature/*
      - internal/release/*
pr: ['*']
resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    featureFlags:
      autoBaseline: false
      autoEnableRoslynWithNewRuleset: false  
    sdl:
      createAdoIssuesForJustificationsForDisablement: false
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: 1es-windows-2022
        os: windows
      enabled: false
      baseline:
        baselineFile: $(Build.SourcesDirectory)\.config\guardian\.gdnbaselines
      binskim:
        preReleaseVersion: '4.3.1'
        enabled: false
        justificationForDisabling: 'NonProduction'
      policheck:
        enabled: false
        justificationForDisabling: 'NonProduction'
      tsa:
        enabled: false
        justificationForDisabling: 'NonProduction'
      antimalwareScan:
        enabled: false
        justificationForDisabling: 'NonProduction'
      prefast:
        enabled: false
        justificationForDisabling: 'NonProduction'
      codeQL:
        compiled:
          enabled: false
          justificationForDisabling: 'NonProduction'
      psscriptanalyzer:
        enabled: false
        justificationForDisabling: 'NonProduction'
      credscan:
        enabled: false
        justificationForDisabling: 'NonProduction'
      spmi:
        enabled: false
        justificationForDisabling: 'NonProduction'
      componentgovernance:
        enabled: false
        justificationForDisabling: 'NonProduction'
      eslint:
        enabled: false
        justificationForDisabling: 'NonProduction'
      armory:
        enabled: false
        justificationForDisabling: 'NonProduction'
    customBuildTags:
    - ES365AIMigrationTooling
    settings:
      networkIsolationPolicy: Permissive,CFSClean
    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enableMicrobuild: true
          enablePublishBuildArtifacts: true
          enablePublishBuildAssets: false
          enablePublishTestResults: false
          publishAssetsImmediately: true
          isAssetlessBuild: true
          enableTelemetry: true
          helixRepo: dotnet/efcore
          jobs:
          - job: Helix_Windows
            displayName: 'Helix Windows'
            timeoutInMinutes: 180
            pool:
              name: $(DncEngInternalBuildPool)
              demands: ImageOverride -equals 1es-windows-2022
              os: windows
            variables:
              - skipComponentGovernanceDetection: true
              - name: _HelixBuildConfig
                value: $(_BuildConfig)
              - name: HelixTargetQueues
                value: Windows.10.Amd64
              - name: _HelixAccessToken
                value: $(HelixApiAccessToken)
            steps:
              - task: NuGetCommand@2
                displayName: 'Clear NuGet caches'
                condition: succeeded()
                inputs:
                  command: custom
                  arguments: 'locals all -clear'
              - template: /eng/common/templates-official/steps/enable-internal-sources.yml
              - template: /eng/common/templates-official/steps/enable-internal-runtimes.yml
              - template: /eng/common/core-templates/steps/get-delegation-sas.yml
                parameters:
                  federatedServiceConnection: 'dotnetbuilds-internal-read'
                  outputVariableName: 'dotnetbuilds-internal-container-read-token'
                  expiryInHours: 3
                  base64Encode: false
                  storageAccount: dotnetbuilds
                  container: internal
                  permissions: rl
              - script: restore.cmd -ci /p:configuration=$(_BuildConfig) $(_InternalRuntimeDownloadArgs)
                displayName: Restore packages
              - script: .dotnet\dotnet build eng\helix.proj /restore /t:Test /p:configuration=$(_BuildConfig) /bl:$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)/SendToHelix.binlog $(_InternalRuntimeDownloadArgs)
                displayName: Send tests to helix
                env:
                  HelixAccessToken: $(_HelixAccessToken)
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  DotNetBuildsInternalReadSasToken: $(dotnetbuilds-internal-container-read-token)

          - job: Helix_macOS_x64
            displayName: 'Helix macOS x64'
            timeoutInMinutes: 180
            pool:
              name: $(DncEngInternalBuildPool)
              demands: ImageOverride -equals 1es-windows-2022
              os: windows
            variables:
              - skipComponentGovernanceDetection: true
              - name: _HelixBuildConfig
                value: $(_BuildConfig)
              - name: HelixTargetQueues
                value: OSX.15.Amd64
              - name: _HelixAccessToken
                value: $(HelixApiAccessToken)
            steps:
              - task: NuGetCommand@2
                displayName: 'Clear NuGet caches'
                condition: succeeded()
                inputs:
                  command: custom
                  arguments: 'locals all -clear'
              - template: /eng/common/templates-official/steps/enable-internal-sources.yml
              - template: /eng/common/templates-official/steps/enable-internal-runtimes.yml
              - template: /eng/common/core-templates/steps/get-delegation-sas.yml
                parameters:
                  federatedServiceConnection: 'dotnetbuilds-internal-read'
                  outputVariableName: 'dotnetbuilds-internal-container-read-token'
                  expiryInHours: 3
                  base64Encode: false
                  storageAccount: dotnetbuilds
                  container: internal
                  permissions: rl
              - script: restore.cmd -ci /p:configuration=$(_BuildConfig) $(_InternalRuntimeDownloadArgs)
                displayName: Restore packages
              - script: .dotnet\dotnet build eng\helix.proj /restore /t:Test /p:configuration=$(_BuildConfig) /bl:$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)/SendToHelix.binlog $(_InternalRuntimeDownloadArgs)
                displayName: Send tests to helix
                env:
                  HelixAccessToken: $(_HelixAccessToken)
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  DotNetBuildsInternalReadSasToken: $(dotnetbuilds-internal-container-read-token)

          - job: Helix_macOS_ARM64
            displayName: 'Helix macOS ARM64'
            timeoutInMinutes: 180
            pool:
              name: $(DncEngInternalBuildPool)
              demands: ImageOverride -equals 1es-windows-2022
              os: windows
            variables:
              - skipComponentGovernanceDetection: true
              - name: _HelixBuildConfig
                value: $(_BuildConfig)
              - name: HelixTargetQueues
                value: OSX.15.ARM64
              - name: _HelixAccessToken
                value: $(HelixApiAccessToken)
            steps:
              - task: NuGetCommand@2
                displayName: 'Clear NuGet caches'
                condition: succeeded()
                inputs:
                  command: custom
                  arguments: 'locals all -clear'
              - template: /eng/common/templates-official/steps/enable-internal-sources.yml
              - template: /eng/common/templates-official/steps/enable-internal-runtimes.yml
              - template: /eng/common/core-templates/steps/get-delegation-sas.yml
                parameters:
