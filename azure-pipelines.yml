variables:
  - name: _PublishUsingPipelines
    value: false
  - template: /eng/common/templates-official/variables/pool-providers.yml@self
trigger:
  batch: true
  branches:
    include:
      - main
      - release/*
pr: none
resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      createAdoIssuesForJustificationsForDisablement: false
      sourceAnalysisPool:
        name: $(DncEngInternalBuildPool)
        image: 1es-windows-2022
        os: windows
    settings:
      networkIsolationPolicy: Permissive,CFSClean
    stages:
    - stage: build
      displayName: Build
      jobs:
      - template: /eng/common/templates-official/jobs/jobs.yml@self
        parameters:
          enablePublishBuildArtifacts: true
          enablePublishBuildAssets: false
          enablePublishTestResults: false
          publishAssetsImmediately: true
          isAssetlessBuild: true
          enableTelemetry: true
    - stage: test
      displayName: Test
      dependsOn: []
      jobs:
      - job: Test
        displayName: Test (Linux)
        pool:
          name: $(DncEngInternalBuildPool)
          image: ubuntu.2404.amd64
          os: linux
        variables:
          SQLSERVER_TEST_PROJECTS: >-
            test/EFCore.SqlServer.FunctionalTests
            test/EFCore.SqlServer.HierarchyId.Tests
            test/EFCore.CrossStore.FunctionalTests
            test/EFCore.OData.FunctionalTests
            test/EFCore.AspNet.SqlServer.FunctionalTests
            test/EFCore.VisualBasic.FunctionalTests
            test/EFCore.FSharp.FunctionalTests
          ADDITIONAL_EXCLUDED_PROJECTS: >-
            Cosmos.FunctionalTests
            Specification.Tests
            Microsoft.Data.Sqlite
            EFCore.Sqlite
            EFCore.AspNet.Sqlite
            TrimmingTests
            NativeAotTests
        steps:
        - checkout: self
        - script: ./restore.sh
          displayName: Restore
        - script: |
            mkdir -p artifacts/coverage
            pattern=$(echo "$SQLSERVER_TEST_PROJECTS $ADDITIONAL_EXCLUDED_PROJECTS" | xargs -n1 | tr '\n' '|' | sed 's/|$//')
            failed=0
            for proj in $(find test -maxdepth 2 \( -name '*.csproj' -o -name '*.fsproj' \) \
              | grep -v -E "$pattern"); do
              dotnet test "$proj" \
                -- --coverage --coverage-output-format cobertura \
                --coverage-output "$PWD/artifacts/coverage/$(basename "$proj").cobertura.xml" || failed=1
            done
            exit $failed
          displayName: Test
        - script: |
            shopt -s nullglob
            files=(artifacts/coverage/*.cobertura.xml)
            if [ ${#files[@]} -gt 0 ]; then
              export PATH="$PATH:$HOME/.dotnet/tools"
              dotnet tool update --global dotnet-coverage
              dotnet-coverage merge -o artifacts/coverage/coverage.cobertura.xml -f cobertura "${files[@]}"
            fi
          displayName: Merge coverage reports
          condition: always()
          continueOnError: true
        - task: PublishCodeCoverageResults@2
          displayName: Publish code coverage
          inputs:
            summaryFileLocation: artifacts/coverage/coverage.cobertura.xml
          condition: always()
          continueOnError: true
