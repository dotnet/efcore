# Automatically notifies @copilot when CI checks fail on its non-draft PRs.
# Waits until all external checks complete, then posts a comment asking copilot to investigate.
# Includes the specific check name when exactly one check (besides the aggregate) fails.
# Posts at most MAX_COMMENTS notification comments per PR to avoid noise.

name: Notify Copilot of CI Failures

on:
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  checks: read

jobs:
  notify:
    # Skip GitHub Actions check suites to avoid processing our own workflow runs
    if: github.event.check_suite.app.slug != 'github-actions'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Copilot of CI failures
        uses: actions/github-script@v8
        with:
          script: |
            const MAX_COMMENTS = 3;
            const AGGREGATE_CHECK = 'efcore-ci';

            const checkSuite = context.payload.check_suite;
            const headSha = checkSuite.head_sha;
            const pullRequests = checkSuite.pull_requests || [];

            if (pullRequests.length === 0) {
              console.log('No pull requests associated with this check suite');
              return;
            }

            for (const prRef of pullRequests) {
              const prNumber = prRef.number;
              console.log(`Processing PR #${prNumber}`);

              // Get full PR details
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });

              // Only non-draft PRs by copilot
              if (pr.user.login !== 'copilot') {
                console.log(`PR #${prNumber} by ${pr.user.login}, not copilot — skipping`);
                continue;
              }

              if (pr.draft) {
                console.log(`PR #${prNumber} is a draft — skipping`);
                continue;
              }

              // Ensure all non-GitHub-Actions check suites are complete
              const { data: suitesData } = await github.rest.checks.listSuitesForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100
              });

              const pending = suitesData.check_suites.filter(
                s => s.status !== 'completed' && s.app?.slug !== 'github-actions'
              );

              if (pending.length > 0) {
                console.log(`${pending.length} check suite(s) still running — waiting for next completion`);
                continue;
              }

              // Gather all check runs for the head SHA
              let allCheckRuns = [];
              let page = 1;
              while (true) {
                const { data } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100,
                  page
                });
                allCheckRuns = allCheckRuns.concat(data.check_runs);
                if (allCheckRuns.length >= data.total_count) break;
                page++;
              }

              const failedChecks = allCheckRuns.filter(
                r => r.conclusion === 'failure' && r.name !== AGGREGATE_CHECK
              );

              if (failedChecks.length === 0) {
                console.log('No failed checks (excluding aggregate) — CI is green');
                continue;
              }

              console.log(`Failed checks: ${failedChecks.map(c => c.name).join(', ')}`);

              // Check for existing notification comments
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });

              // Don't exceed the per-PR comment limit
              const existingNotifications = comments.filter(
                c => c.body?.includes('@copilot investigate CI failures')
              );

              if (existingNotifications.length >= MAX_COMMENTS) {
                console.log(`Already ${existingNotifications.length}/${MAX_COMMENTS} notifications — skipping`);
                continue;
              }

              // Don't duplicate for the same commit SHA
              const shaTag = `<!-- ci-notify: ${headSha} -->`;
              if (comments.some(c => c.body?.includes(shaTag))) {
                console.log(`Already notified for SHA ${headSha.substring(0, 7)}`);
                continue;
              }

              // Build the comment
              let body = '@copilot investigate CI failures';
              if (failedChecks.length === 1) {
                body += ` (check: \`${failedChecks[0].name}\`)`;
              }
              body += `\n${shaTag}`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });

              console.log(`Posted CI failure notification on PR #${prNumber}`);
            }
